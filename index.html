<!DOCTYPE HTML>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
		<script src="https://kit.fontawesome.com/a076d05399.js"></script>
		<title>Milena Markovich Portfolio</title>
		<style>
				@font-face {
  					font-family: headings;
  					src: url(Elianto-Regular.ttf);
  					font-weight: 200;
				}
				@font-face {
  					font-family: main_text;
  					src: url(SpartanMB-Thin.ttf);
  					font-weight: 100;
				}
				
    			body {
        			background-image: url(spaceranger.gif);
        			background-repeat: no-repeat;
        			background-attachment: fixed;
        			background-position: center;
            		-webkit-background-size: cover;
        			-moz-background-size:cover;
        			-o-background-size:cover;
        			background-size: cover;
    			}
    			#all-contents {
        			margin: auto;
    			}

    			/* navigation menu */
    			nav {
            		text-align: left;
            		width: 100vw;
    			}
    			.topnav ul {
    				margin: 0;
    				padding: 0;
        			color: white;
        			font-family: main_text;
        			overflow: hidden;
    			}
    			nav li {
        			float: left;
        			list-style-type: none;
        		}
        		nav li a{            		
        			color: white;
        			font-family: main_text; 
        			display: block;
        			padding: 14px 16px;
        			text-decoration: none;
        			float: left;
        			text-align: left;
        			display: block;
        		}
    			.topnav a {
    				padding: 14px 16px;
        			text-decoration: none;
        			font-size: 24px;
        			color: white;
         			font-family: main_text;
    			}
    			.topnav a:hover {
        			text-decoration: none;
        			color: white;
        			font-weight: bold;
            		font-family: main_text;

    			}
    			.topnav .icon{
    				display: none;
    			}
    			/* When the screen is less than 600 pixels wide, hide all links, except for the first one ("Home"). Show the link that contains should open and close the topnav (.icon) */
				@media screen and (max-width: 600px) {
				  .topnav a:not(:first-child) {display: none}
				  .topnav a:first-child {background-color: rgb(24,2,12,.2); backdrop-filter: blur(25px)}
				  .topnav a.icon {
				    float: right;
				    display: block;
				  }
				}
				
				/* The "responsive" class is added to the topnav with JavaScript when the user clicks on the icon. This class makes the topnav look good on small screens (display the links vertically instead of horizontally) */
				@media screen and (max-width: 600px) {
				  .topnav.responsive {position: relative}
				  .topnav.responsive a.icon {
				    position: absolute;
				    right: 0;
				    top: 0;
				  }
				  .topnav.responsive a.icon {
				    float: right;
				    display: block;
				    background-colour: none;
				  }
				  .topnav.responsive a {
				    float: none;
				    display: block;
				    background-color: rgb(24,2,12,.2);
            		backdrop-filter: blur(25px);
				    padding: 0;
				    margin: 0;
				    width: 25%;
				    text-align: left;
        			text-decoration: none;
        			font-size: 24px;
        			color: white;
         			font-family: main_text;
				  }
				}
    			.creds{
    				font-family: main_text;
    				color: white;
    				text-align: left;
    				font-size: 12px;
    				bottom: 0;
    			}
    			.creds a {
    				font-family: main_text;
    				text-decoration: none;
    				color: white;
    			}
    			.creds a:hover {
    				font-family: main_text;
    				text-decoration: none;
    				color: white;
    				font-weight: bold;
    			}
    			h1 {
    				font-family: headings;
    				text-decoration: none;
    				color: white;
					font-size: 100px;
					padding: 0px;
					text-align: left;
					display: flex;
    			}

		</style>
 	</head>
  
	<body>
		<div id="all-contents">
			<nav class="topnav" id="myTopnav">
				<a href="index.html" class="active"> Home </a>
				<a href="about.html"> About Me </a>
				<a href="software.html"> Software Projects </a>
				<a href="hardware.html"> Electrical Projects </a>
				<a href="mech.html"> Design Projects </a>
				<a href="javascript:void(0);" class="icon" onclick="myFunction()">
					<i class="fas fa-bars"></i>
				</a>
			</nav>
			<script>
				function myFunction() {
				  var x = document.getElementById("myTopnav");
				  if (x.className === "topnav") {
				    x.className += " responsive";
				  } else {
				    x.className = "topnav";
				  }
				}
			</script>
      		<h1>
				<p> Milena <br />Markovich <p>
			</h1>
			<main>
				<div class="creds">
					<p>Background GIF credit to <a href="https://dribbble.com/PijWarren">PJ Warren</a></p>
				</div>
			</main>
		</div>
  	</body>
</html>
